name: Build AesingFlow node image

on:
  push:
    branches: [main]
    paths:
      - 'node-aesingflow/**'
      - 'docker-compose.node-aesingflow.yml'
      - '.github/workflows/build-node-image.yml'
      - 'DEPLOY.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/astracat2022/rennawave-node-aesingflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify bundled AesingFlow core source
        run: |
          test -f node-aesingflow/Xray-core/infra/conf/aesingflow.go
          test -f node-aesingflow/Xray-core/transport/internet/aesingflow/listener.go
          grep -q 'proxy/aesingflow' node-aesingflow/Xray-core/main/distro/all/all.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./node-aesingflow
          file: ./node-aesingflow/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
