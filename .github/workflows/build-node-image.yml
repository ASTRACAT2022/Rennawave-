name: Build AesingFlow node image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.node-aesingflow'
      - 'docker-compose.node-aesingflow.yml'
      - '.github/workflows/build-node-image.yml'
      - 'DEPLOY.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/astracat2022/rennawave-node-aesingflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      AESINGFLOW_CORE_URL: ${{ vars.AESINGFLOW_CORE_URL || secrets.AESINGFLOW_CORE_URL }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve AesingFlow core mode
        run: |
          if [ -z "$AESINGFLOW_CORE_URL" ]; then
            echo "::notice::AESINGFLOW_CORE_URL is not set. The image will keep the upstream core and can load an AesingFlow core at runtime through CUSTOM_CORE_URL."
          else
            echo "::notice::AESINGFLOW_CORE_URL is set. The image will bake the custom core into /usr/local/bin/xray."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.node-aesingflow
          push: true
          platforms: linux/amd64
          build-args: |
            AESINGFLOW_CORE_URL=${{ env.AESINGFLOW_CORE_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
